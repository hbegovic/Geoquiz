<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>🔧 Admin Panel - Geo Kviz</title>
    
    <style>
        /* === RESET I OSNOVNI STILOVI === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: system-ui, 'Segoe UI', Roboto, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 25%, #2d1b69 50%, #7c3aed 100%);
            min-height: 100vh;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }
        
        /* === ANIMIRANI POZADINSKI EFEKTI === */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 118, 117, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(59, 130, 246, 0.2) 0%, transparent 50%);
            animation: gradientShift 20s ease-in-out infinite;
            z-index: -2;
        }
        
        /* === PARTICLES CANVAS === */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }
        
        @keyframes gradientShift {
            0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
            50% { opacity: 0.8; transform: scale(1.1) rotate(180deg); }
        }
        
        /* === GLAVNI KONTEJNER === */
        .wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        /* === HEADER === */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .back-btn {
            color: #c7d2fe;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        .admin-title {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 800;
            background: linear-gradient(45deg, #ffffff, #c7d2fe, #fbbf24);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 3s ease-in-out infinite;
        }
        
        @keyframes gradientText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* === FORM KONTEJNER === */
        .form-container {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }
        
        .form-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(124, 58, 237, 0.1), rgba(59, 130, 246, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 22px;
        }
        
        .form-container:hover::before {
            opacity: 1;
        }
        
        /* === FORM STILOVI === */
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
            z-index: 1;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-label {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-input, .form-select {
            padding: 16px 20px;
            font-size: 1rem;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            outline: none;
        }
        
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .form-input:focus, .form-select:focus {
            border-color: rgba(124, 58, 237, 0.8);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.3);
            background: rgba(255, 255, 255, 0.12);
        }
        
        .form-select option {
            background: #1a1a3e;
            color: #ffffff;
        }
        
        /* === FILE INPUT === */
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        
        .file-input {
            position: absolute;
            left: -9999px;
            opacity: 0;
        }
        
        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            border-radius: 16px;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            min-height: 80px;
        }
        
        .file-input-label:hover {
            border-color: rgba(124, 58, 237, 0.8);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .file-preview {
            margin-top: 12px;
            padding: 12px;
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            color: #86efac;
            font-size: 0.9rem;
            display: none;
        }
        
        /* === SUBMIT BUTTON === */
        .submit-btn {
            padding: 20px 40px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(45deg, #3b82f6, #1d4ed8);
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.4);
        }
        
        .submit-btn:hover::before {
            left: 100%;
        }
        
        .submit-btn:active {
            transform: translateY(-1px);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* === PORUKE === */
        .message {
            padding: 16px 20px;
            border-radius: 16px;
            font-weight: 600;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: slideInDown 0.5s ease;
        }
        
        .message.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }
        
        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        
        @keyframes slideInDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* === LOADING STATE === */
        .loading {
            position: relative;
        }
        
        .loading::after {
            content: '';
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: translateY(-50%) rotate(0deg); }
            to { transform: translateY(-50%) rotate(360deg); }
        }
        
        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .wrapper {
                padding: 16px;
            }
            
            .form-container {
                padding: 24px;
            }
            
            .header {
                gap: 15px;
            }
            
            .admin-title {
                font-size: 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .form-container {
                padding: 20px;
            }
            
            .submit-btn {
                padding: 16px 32px;
                font-size: 1.1rem;
            }
        }
        
        /* === ACCESSIBILITY === */
        .form-input:focus, .form-select:focus, .submit-btn:focus {
            outline: none;
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <canvas id="particles-canvas"></canvas>
    
    <div class="wrapper">
        <div class="header">
            <a href="/" class="back-btn">← Nazad na kviz</a>
            <h1 class="admin-title">🔧 Admin Panel</h1>
        </div>

        <div class="form-container">
            <form class="admin-form" method="POST" enctype="multipart/form-data" id="adminForm">
                <div class="form-group">
                    <label for="category_id" class="form-label">📂 Kategorija:</label>
                    <select name="category_id" id="category_id" class="form-select" required>
                        <option value="">Odaberi kategoriju...</option>
                        {% for c in categories %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="image" class="form-label">🖼️ Slika:</label>
                    <div class="file-input-wrapper">
                        <input type="file" name="image" id="image" class="file-input" accept=".png,.jpg,.jpeg,.svg" required>
                        <label for="image" class="file-input-label">
                            <span>📁</span>
                            <span id="file-text">Kliknite da odaberete sliku</span>
                        </label>
                    </div>
                    <div class="file-preview" id="file-preview"></div>
                </div>

                <div class="form-group">
                    <label for="correct_answer" class="form-label">✅ Tačan odgovor:</label>
                    <input type="text" name="correct_answer" id="correct_answer" class="form-input" placeholder="Unesite tačan odgovor..." required>
                </div>

                <div class="form-group">
                    <label for="wrong1" class="form-label">❌ Pogrešan odgovor 1:</label>
                    <input type="text" name="wrong1" id="wrong1" class="form-input" placeholder="Unesite prvi pogrešan odgovor..." required>
                </div>

                <div class="form-group">
                    <label for="wrong2" class="form-label">❌ Pogrešan odgovor 2:</label>
                    <input type="text" name="wrong2" id="wrong2" class="form-input" placeholder="Unesite drugi pogrešan odgovor..." required>
                </div>

                <div class="form-group">
                    <label for="wrong3" class="form-label">❌ Pogrešan odgovor 3:</label>
                    <input type="text" name="wrong3" id="wrong3" class="form-input" placeholder="Unesite treći pogrešan odgovor..." required>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    💾 Dodaj pitanje
                </button>
            </form>
        </div>

        <!-- Success/Error poruke će se dodati dinamički -->
        <div id="message-container"></div>
    </div>

    <script>
        // === PARTICLES SISTEM (isti kao u kvizu) ===
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2 + 1,
                opacity: Math.random() * 0.5 + 0.2
            };
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push(createParticle());
            }
        }

        function updateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(particle => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                
                if (particle.x < 0 || particle.x > canvas.width) particle.vx *= -1;
                if (particle.y < 0 || particle.y > canvas.height) particle.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${particle.opacity})`;
                ctx.fill();
                
                // Connecting lines
                particles.forEach(other => {
                    const dx = particle.x - other.x;
                    const dy = particle.y - other.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 100) {
                        ctx.beginPath();
                        ctx.moveTo(particle.x, particle.y);
                        ctx.lineTo(other.x, other.y);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 * (1 - distance / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                });
            });
            
            requestAnimationFrame(updateParticles);
        }

        // Init particles
        resizeCanvas();
        initParticles();
        updateParticles();
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        // === FILE INPUT HANDLING ===
        const fileInput = document.getElementById('image');
        const fileText = document.getElementById('file-text');
        const filePreview = document.getElementById('file-preview');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                fileText.textContent = file.name;
                filePreview.textContent = `✅ Odabrana slika: ${file.name} (${Math.round(file.size / 1024)} KB)`;
                filePreview.style.display = 'block';
            } else {
                fileText.textContent = 'Kliknite da odaberete sliku';
                filePreview.style.display = 'none';
            }
        });

        // === FORM VALIDATION I SUBMIT ===
        const form = document.getElementById('adminForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageContainer = document.getElementById('message-container');

        form.addEventListener('submit', function(e) {
            // Add loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Dodajem...';
        });

        // === FORM ENHANCEMENTS ===
        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'translateY(-2px)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'translateY(0)';
            });
        });

        // === SUCCESS/ERROR MESSAGE HANDLING ===
        function showMessage(text, type) {
            messageContainer.innerHTML = `
                <div class="message ${type}">
                    ${text}
                </div>
            `;
            
            setTimeout(() => {
                messageContainer.innerHTML = '';
            }, 5000);
        }

        // === KEYBOARD SHORTCUTS ===
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                form.submit();
            }
        });

        // Console info
        console.log('🔧 Admin Panel učitan!');
        console.log('⌨️  Koristite Ctrl+Enter za brže slanje');
        console.log('✨ Svi efekti aktivni!');
    </script>
</body>
</html>
