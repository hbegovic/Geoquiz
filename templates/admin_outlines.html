<!doctype html>
<html lang="bs">
<head>
  <meta charset="utf-8">
  <title>Upravljanje konturama</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif;color:#e8e8f0;background:#151626;margin:0;padding:24px}
    a,button,input{font:inherit}
    .topbar{display:flex;gap:12px;align-items:center;margin-bottom:16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
    .card{background:#1e2040;border-radius:16px;padding:12px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
    .card img{width:100%;height:120px;object-fit:contain;background:#0e1030;border-radius:12px}
    .title{margin:8px 0 6px;font-weight:600}
    .filename{opacity:.7;font-size:.9em}
    .actions{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
    .checkbox{font-size:.85em;opacity:.85}
    .pager{display:flex;gap:12px;align-items:center;justify-content:center;margin:24px 0}
    .btn{background:#3b82f6;border:none;color:white;padding:8px 12px;border-radius:10px;cursor:pointer;text-decoration:none;display:inline-block}
    .btn.danger{background:#ef4444}
    .input{padding:8px 10px;border-radius:10px;border:1px solid #2f325f;background:#0e1030;color:#e8e8f0}
    .muted{opacity:.7}
  </style>
</head>
<body>

  <div class="topbar">
    <a class="btn" href="{{ url_for('home') }}">← Nazad</a>
    <h2 style="margin:0">Upravljanje konturama</h2>
    <div class="muted">Ukupno: {{ total }}</div>
    <form method="get" style="margin-left:auto;display:flex;gap:8px">
      <input class="input" type="search" name="q" value="{{ q }}" placeholder="Pretraga (država ili fajl)">
      <button class="btn" type="submit">Traži</button>
    </form>
  </div>

  <div class="grid">
    {% for it in items %}
    <div class="card">
      <img src="{{ it.image_url }}" alt="{{ it.filename }}">
      <div class="title">{{ it.correct or '—' }}</div>
      <div class="filename">{{ it.filename }}</div>
      <form class="actions" method="post" action="{{ url_for('admin_outlines_delete', qid=it.id) }}"
            onsubmit="return confirm('Obrisati: {{ it.correct or it.filename }} ?')">
        <label class="checkbox">
          <input type="checkbox" name="delete_file" value="1"> izbriši i fajl
        </label>
        <button class="btn danger" type="submit">Obriši</button>
      </form>
    </div>
    {% endfor %}
  </div>

  <div class="pager">
    {% if page > 1 %}
      <a class="btn" href="{{ url_for('admin_outlines', page=page-1, q=q) }}">‹ Nazad</a>
    {% endif %}
    <div>Stranica {{ page }} / {{ pages }}</div>
    {% if page < pages %}
      <a class="btn" href="{{ url_for('admin_outlines', page=page+1, q=q) }}">Naprijed ›</a>
    {% endif %}
  </div>

</body>
</html>
