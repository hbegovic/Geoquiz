<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>🌍 Geo Kviz - Odaberi svoju kategoriju</title>
    
    <style>
        /* === RESET I OSNOVNI STILOVI === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: system-ui, 'Segoe UI', Roboto, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 25%, #2d1b69 50%, #7c3aed 100%);
            min-height: 100vh;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }
        
        /* === ANIMIRANI POZADINSKI EFEKTI === */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 118, 117, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(59, 130, 246, 0.2) 0%, transparent 50%);
            animation: gradientShift 15s ease-in-out infinite;
            z-index: -1;
        }
        
        @keyframes gradientShift {
            0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
            50% { opacity: 0.8; transform: scale(1.1) rotate(180deg); }
        }
        
        /* === GLAVNI KONTEJNER === */
        .wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }
        
        /* === NAVIGACIJA - DODANO === */
        .nav-bar {
            position: absolute;
            top: 24px;
            right: 32px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }
        
        .nav-bar span, .nav-bar a {
            padding: 8px 12px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .nav-bar span {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        
        .nav-bar .login-btn {
            background: #2563eb;
        }
        
        .nav-bar .login-btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        
        .nav-bar .register-btn {
            background: #16a34a;
        }
        
        .nav-bar .register-btn:hover {
            background: #15803d;
            transform: translateY(-1px);
        }
        
        .nav-bar .logout-btn {
            background: #dc2626;
        }
        
        .nav-bar .logout-btn:hover {
            background: #b91c1c;
            transform: translateY(-1px);
        }
        .nav-bar .admin-btn { background: #7c3aed; }
        .nav-bar .admin-btn:hover { background: #6d28d9; transform: translateY(-1px); }

        /* === NASLOV === */
        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 900;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ffffff, #c7d2fe, #fbbf24, #ec4899);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 4s ease-in-out infinite;
            text-shadow: none;
            position: relative;
        }
        
        h1::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shine 3s ease-in-out infinite;
        }
        
        @keyframes gradientText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        /* === SUBTITLE === */
        .subtitle {
            text-align: center;
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            margin-bottom: 50px;
            opacity: 0.9;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        
        /* === GRID LAYOUT === */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        
        /* === KARTICE === */
        .category-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            backdrop-filter: blur(20px) saturate(150%);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: block;
            transform-style: preserve-3d;
        }
        
        /* === KARTICE - POZADINSKI EFEKTI === */
        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                45deg, 
                rgba(124, 58, 237, 0.1) 0%, 
                rgba(59, 130, 246, 0.1) 50%, 
                rgba(236, 72, 153, 0.1) 100%
            );
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: 22px;
        }
        
        .category-card::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #7c3aed, #3b82f6, #ec4899, #fbbf24);
            background-size: 300% 300%;
            border-radius: 26px;
            z-index: -1;
            opacity: 0;
            animation: borderGlow 3s ease-in-out infinite;
            transition: opacity 0.4s ease;
        }
        
        @keyframes borderGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* === HOVER EFEKTI === */
        .category-card:hover {
            transform: translateY(-12px) scale(1.03) rotateX(5deg);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.4),
                0 15px 35px rgba(124, 58, 237, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .category-card:hover::before {
            opacity: 1;
        }
        
        .category-card:hover::after {
            opacity: 1;
        }
        
        .category-card:hover .category-name {
            transform: translateY(-2px);
            color: #ffffff;
        }
        
        .category-card:hover .category-description {
            transform: translateY(-1px);
            opacity: 1;
        }
        
        .category-card:active {
            transform: translateY(-8px) scale(1.01);
            transition: all 0.1s ease;
        }
        
        /* === SADRŽAJ KARTICA === */
        .category-name {
            font-weight: 800;
            font-size: clamp(1.3rem, 3vw, 1.6rem);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }
        
        .category-name span:first-child {
            font-size: clamp(1.8rem, 4vw, 2.2rem);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }
        
        .category-description {
            opacity: 0.85;
            font-size: clamp(1rem, 2.2vw, 1.1rem);
            line-height: 1.6;
            color: #e2e8f0;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
            font-weight: 400;
        }
        
        /* === LOADING ANIMACIJA === */
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        .loading::after {
            content: '🌍';
            display: block;
            font-size: 3rem;
            margin-top: 20px;
            animation: spin 2s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* === ERROR PORUKE === */
        .error {
            grid-column: 1 / -1;
            background: rgba(239, 68, 68, 0.15);
            border: 2px solid rgba(239, 68, 68, 0.3);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
            backdrop-filter: blur(10px);
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .error h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #fca5a5;
        }
        
        /* === EMPTY STATE === */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            opacity: 0.7;
        }
        
        .empty-state h3 {
            font-size: 2rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #fbbf24, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* === RESPONSIVE DESIGN === */
        @media (max-width: 768px) {
            .wrapper {
                padding: 30px 16px;
            }
            
            .nav-bar {
                position: static;
                justify-content: center;
                margin-bottom: 30px;
            }
            
            .categories-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .category-card {
                padding: 24px;
                border-radius: 20px;
            }
            
            .category-card:hover {
                transform: translateY(-8px) scale(1.02);
            }
        }
        
        @media (max-width: 480px) {
            .subtitle {
                margin-bottom: 40px;
            }
            
            .category-card {
                padding: 20px;
            }
            
            .nav-bar {
                flex-direction: column;
                gap: 8px;
                align-items: center;
            }
        }
        
        /* === ACCESSIBILITY === */
        .category-card:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 0 0 3px rgba(124, 58, 237, 0.4),
                0 15px 30px rgba(0, 0, 0, 0.3);
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="nav-bar">
            {% if session.get('user') %}
                <span>👋 {{ session.user.username }}</span>
                {% if session.user.is_admin %}
                <a href="{{ url_for('admin_users') }}" class="admin-btn">⚙️ Admin</a>
                {% endif %}
                <a href="{{ url_for('logout') }}" class="logout-btn">Odjava</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="login-btn">Prijava</a>
                <a href="{{ url_for('register') }}" class="register-btn">Registracija</a>
            {% endif %}
        </div>
        
        <h1>🌍 Geo Kviz</h1>
        <p class="subtitle">Odaberi kategoriju i započni svoje geografsko putovanje!</p>
        
        <div id="categories-container" class="categories-grid">
            <div class="loading">Učitavam kategorije...</div>
        </div>
    </div>

    <script>
        /**
         * Učitava kategorije sa servera i prikazuje ih
         */
        async function loadCategories() {
            const container = document.getElementById('categories-container');
            
            try {
                // Prikaži loading sa animacijom
                container.innerHTML = '<div class="loading">Učitavam kategorije...</div>';
                
                // Poziv na API
                const response = await fetch('/api/categories');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const categories = await response.json();
                
                // Kratka pauza za smooth prijelaz
                await new Promise(resolve => setTimeout(resolve, 300));
                
                container.innerHTML = '';
                
                // Provjeri ima li podataka
                if (!categories || categories.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>📭 Nema kategorija</h3>
                            <p>Baza je prazna ili nema definiranih kategorija.</p>
                        </div>
                    `;
                    return;
                }
                
                // Stvori kartice sa staggered animacijom
                categories.forEach((category, index) => {
                    const card = createCategoryCard(category);
                    card.style.opacity = '0';
                    card.style.transform = 'translateY(30px)';
                    container.appendChild(card);
                    
                    // Animiraj pojavljivanje sa kašnjenjem
                    setTimeout(() => {
                        card.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    }, index * 150);
                });

                // Statičke kartice — dodaj sve redom s animacijom
                const staticCards = [
                    createPopulationCard(),
                    createBordersCard(),
                    createGeoMixCard(),
                    createDuelCard(),
                    createMultiplayerCard(),
                    createLeaderboardCard(),
                ];
                staticCards.forEach((card, i) => {
                    card.style.opacity = '0';
                    card.style.transform = 'translateY(30px)';
                    container.appendChild(card);
                    setTimeout(() => {
                        card.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    }, (categories.length + i) * 150);
                });

                console.log(`✅ Učitano ${categories.length} kategorija (plus Multiplayer i Leaderboard)`);
                
            } catch (error) {
                console.error('❌ Greška pri učitavanju:', error);
                
                let errorMessage = 'Nepoznata greška';
                if (error.message.includes('fetch') || error.message.includes('Failed to fetch')) {
                    errorMessage = 'Nema konekcije sa serverom. Pokreni Flask app!';
                } else if (error.message.includes('404')) {
                    errorMessage = 'API ruta ne postoji. Provjeri /api/categories';
                } else if (error.message.includes('500')) {
                    errorMessage = 'Greška na serveru. Provjeri bazu podataka.';
                }
                
                container.innerHTML = `
                    <div class="error">
                        <h3>⚠️ Ups!</h3>
                        <p>${errorMessage}</p>
                        <small style="opacity: 0.7; margin-top: 10px; display: block;">
                            Detalji: ${error.message}
                        </small>
                    </div>
                `;
            }
        }
        
        /**
         * Stvara DOM element za kategoriju
         */
        function createCategoryCard(category) {
            const card = document.createElement('a');
            card.href = `/quiz/${category.id}`;
            card.className = 'category-card';
            card.setAttribute('tabindex', '0');
            
            // Dodaj keyboard support
            card.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    card.click();
                }
            });
            
            // Dodaj ripple effect na klik
            card.addEventListener('click', (e) => {
                const ripple = document.createElement('div');
                const rect = card.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${size}px;
                    left: ${x}px;
                    top: ${y}px;
                    background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
                    border-radius: 50%;
                    pointer-events: none;
                    animation: ripple 0.6s ease-out;
                `;
                
                card.style.position = 'relative';
                card.appendChild(ripple);
                
                setTimeout(() => ripple.remove(), 600);
            });
            
            // Escape HTML za sigurnost
            const safeName = escapeHtml(category.name || 'Nepoznata kategorija');
            const safeDesc = escapeHtml(category.description || 'Nema opisa.');
            const icon = category.icon || '🌏';
            
            card.innerHTML = `
                <div class="category-name">
                    <span>${icon}</span>
                    <span>${safeName}</span>
                </div>
                <div class="category-description">
                    ${safeDesc}
                </div>
            `;
            
            return card;
        }

        function createCard(href, icon, title, desc) {
            const card = document.createElement('a');
            card.href = href; card.className = 'category-card'; card.setAttribute('tabindex', '0');
            card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); } });
            card.addEventListener('click', e => {
                const ripple = document.createElement('div');
                const rect = card.getBoundingClientRect(), size = Math.max(rect.width, rect.height);
                ripple.style.cssText = `position:absolute;width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;background:radial-gradient(circle,rgba(255,255,255,.3) 0%,transparent 70%);border-radius:50%;pointer-events:none;animation:ripple .6s ease-out;`;
                card.style.position = 'relative'; card.appendChild(ripple); setTimeout(() => ripple.remove(), 600);
            });
            card.innerHTML = `<div class="category-name"><span>${icon}</span><span>${title}</span></div><div class="category-description">${desc}</div>`;
            return card;
        }

        function createPopulationCard() { return createCard('/quiz/population','👥','Broj Stanovnika','Procijeni koliko stanovnika ima data država.') }
        function createBordersCard()    { return createCard('/quiz/borders','🗺️','Granice Država','Pogodi koja država graniči s datom državom.') }
        function createGeoMixCard()     { return createCard('/quiz/geomix','🧩','Geo Ekspert','Mix: glavni gradovi, valute, pozivni brojevi, površine.') }
        function createDuelCard()       { return createCard('/quiz/comparison','⚔️','Geo Duel','Koja država ima više? Klikni na odgovor za sekundu!') }

        /**
         * Stvara DOM element za MULTIPLAYER (STATIC)
         */
        function createMultiplayerCard() {
            const card = document.createElement('a');
            card.href = '/multiplayer';
            card.className = 'category-card';
            card.setAttribute('tabindex', '0');

            // keyboard support
            card.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    card.click();
                }
            });

            // ripple efekt
            card.addEventListener('click', (e) => {
                const ripple = document.createElement('div');
                const rect = card.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                ripple.style.cssText = `
                    position:absolute;width:${size}px;height:${size}px;left:${x}px;top:${y}px;
                    background:radial-gradient(circle, rgba(255,255,255,.3) 0%, transparent 70%);
                    border-radius:50%;pointer-events:none;animation:ripple .6s ease-out;
                `;
                card.style.position = 'relative';
                card.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });

            card.innerHTML = `
                <div class="category-name">
                    <span>🎮</span>
                    <span>Multiplayer</span>
                </div>
                <div class="category-description">
                    Igraj protiv drugih igrača online u realnom vremenu.
                </div>
            `;
            return card;
        }

        /**
         * Stvara DOM element za LEADERBOARD (STATIC)
         */
        function createLeaderboardCard() {
            const card = document.createElement('a');
            card.href = '/leaderboard';
            card.className = 'category-card';
            card.setAttribute('tabindex', '0');

            // keyboard support
            card.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    card.click();
                }
            });

            // ripple efekt
            card.addEventListener('click', (e) => {
                const ripple = document.createElement('div');
                const rect = card.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                ripple.style.cssText = `
                    position:absolute;width:${size}px;height:${size}px;left:${x}px;top:${y}px;
                    background:radial-gradient(circle, rgba(255,255,255,.3) 0%, transparent 70%);
                    border-radius:50%;pointer-events:none;animation:ripple .6s ease-out;
                `;
                card.style.position = 'relative';
                card.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });

            card.innerHTML = `
                <div class="category-name">
                    <span>🏆</span>
                    <span>Leaderboard</span>
                </div>
                <div class="category-description">
                    Pogledaj najbolje rezultate i rekorde igrača.
                </div>
            `;
            return card;
        }
        
        /**
         * Escape HTML karaktere za sigurnost
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Dodaj CSS za ripple animaciju
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                0% { transform: scale(0); opacity: 0.3; }
                100% { transform: scale(1); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        // Pokreni kada se stranica učita
        document.addEventListener('DOMContentLoaded', loadCategories);
        
        // Debug info
        console.log('🌍 Geo Kviz - Moderni frontend učitan');
        console.log('✨ Svi efekti aktivni!');
    </script>
</body>
</html>
