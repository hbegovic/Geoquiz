<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>🌍 Geo Kviz - Pitanje</title>
    
    <style>
        /* === RESET I OSNOVNI STILOVI === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: system-ui, 'Segoe UI', Roboto, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 25%, #2d1b69 50%, #7c3aed 100%);
            min-height: 100vh;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }
        
        /* === ANIMIRANI POZADINSKI EFEKTI === */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 118, 117, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(59, 130, 246, 0.2) 0%, transparent 50%);
            animation: gradientShift 20s ease-in-out infinite;
            z-index: -2;
        }
        
        /* === PARTICLES CANVAS === */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }
        
        @keyframes gradientShift {
            0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
            50% { opacity: 0.8; transform: scale(1.1) rotate(180deg); }
        }
        
        /* === GLAVNI KONTEJNER === */
        .wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* === HEADER === */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .back-btn {
            color: #c7d2fe;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        .quiz-title {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 800;
            background: linear-gradient(45deg, #ffffff, #c7d2fe, #fbbf24);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 3s ease-in-out infinite;
        }
        
        .stats {
            margin-left: auto;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .score, .timer, .progress {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .timer {
            position: relative;
            overflow: hidden;
        }
        
        .timer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            width: var(--progress, 100%);
            transition: width 1s linear;
            border-radius: 20px;
            z-index: -1;
        }
        
        @keyframes gradientText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* === GLAVNI SADRŽAJ === */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        /* === SLIKA KONTEJNER === */
        .image-container {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(124, 58, 237, 0.1), rgba(59, 130, 246, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 22px;
        }
        
        .image-container:hover::before {
            opacity: 1;
        }
        
        .image-container img {
            max-width: 100%;
            max-height: 280px;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }
        
        .image-container img:hover {
            transform: scale(1.05);
        }
        
        .loading-text {
            font-size: 1.2rem;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* === OPCIJE === */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .option-btn {
            padding: 20px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(15px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-align: center;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .option-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .option-btn:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }
        
        .option-btn:hover::before {
            opacity: 1;
        }
        
        .option-btn:active {
            transform: translateY(-2px) scale(1.01);
        }
        
        /* === CORRECT/WRONG STILOVI === */
        .option-correct {
            border-color: #22c55e !important;
            background: rgba(34, 197, 94, 0.2) !important;
            animation: correctPulse 0.6s ease;
        }
        
        .option-wrong {
            border-color: #ef4444 !important;
            background: rgba(239, 68, 68, 0.2) !important;
            animation: shake 0.5s ease;
        }
        
        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        /* === ACTIONS === */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        
        .next-btn {
            padding: 16px 32px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(45deg, #3b82f6, #1d4ed8);
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .next-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.4);
        }
        
        .next-btn:hover::before {
            left: 100%;
        }
        
        .next-btn:active {
            transform: translateY(-1px);
        }
        
        /* === PORUKE === */
        .message {
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            padding: 15px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .message.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            animation: slideInUp 0.5s ease;
        }
        
        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            animation: slideInUp 0.5s ease;
        }
        
        .message.timeout {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fcd34d;
            animation: slideInUp 0.5s ease;
        }
        
        /* === FINISH SCREEN === */
        .finish-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            z-index: 1000;
            padding: 40px;
        }
        
        .finish-screen.show {
            display: flex !important;
            animation: slideInUp 0.6s ease;
        }
        
        .finish-content {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        .finish-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, #fbbf24, #f59e0b, #d97706);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 3s ease-in-out infinite;
        }
        
        .final-score {
            font-size: 3rem;
            font-weight: 900;
            color: #22c55e;
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }
        
        .quiz-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #60a5fa;
        }
        
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .finish-actions {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .play-again-btn, .home-btn {
            padding: 16px 32px;
            border-radius: 20px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .play-again-btn {
            background: linear-gradient(45deg, #22c55e, #16a34a);
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
        }
        
        .home-btn {
            background: linear-gradient(45deg, #6b7280, #4b5563);
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(107, 114, 128, 0.3);
        }
        
        @keyframes slideInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .wrapper {
                padding: 16px;
            }
            
            .header {
                gap: 15px;
            }
            
            .stats {
                margin-left: 0;
                width: 100%;
                justify-content: space-between;
            }
            
            .options-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .option-btn {
                padding: 16px;
                min-height: 60px;
            }
            
            .image-container {
                padding: 20px;
                min-height: 250px;
            }
            
            .finish-actions {
                flex-direction: column;
                width: 100%;
            }
            
            .play-again-btn, .home-btn {
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .quiz-title {
                font-size: 1.3rem;
            }
            
            .back-btn {
                padding: 10px 16px;
                font-size: 1rem;
            }
            
            .finish-title {
                font-size: 2rem;
            }
            
            .final-score {
                font-size: 2.5rem;
            }
        }
        
        /* === ACCESSIBILITY === */
        .option-btn:focus {
            outline: none;
            border-color: rgba(124, 58, 237, 0.8);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.3);
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* === OUTLINE MODE === */
        .outline-mode .image-container img {
            filter: invert(1) brightness(1.9) contrast(1.1) drop-shadow(0 0 12px rgba(255,255,255,0.25));
        }

        /* === REGION OVERLAY === */
        .region-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .region-content {
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 28px;
            padding: 48px 36px;
            backdrop-filter: blur(20px);
            text-align: center;
            max-width: 580px;
            width: 100%;
        }
        .region-title {
            font-size: 1.9rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(45deg,#fff,#c7d2fe,#fbbf24);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 3s ease-in-out infinite;
        }
        .region-subtitle {
            opacity: 0.65;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .region-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 14px;
        }
        .region-btn {
            padding: 18px 12px;
            border-radius: 18px;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            backdrop-filter: blur(10px);
        }
        .region-btn:hover {
            transform: translateY(-4px) scale(1.04);
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.15);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }

        /* === STREAK === */
        .streak {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(251,191,36,0.15);
            border: 1px solid rgba(251,191,36,0.35);
            color: #fbbf24;
            font-weight: 700;
            display: none;
        }
        .streak.active {
            display: block;
            animation: streakPop 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes streakPop {
            0%   { transform: scale(0.7); opacity: 0; }
            60%  { transform: scale(1.2); }
            100% { transform: scale(1);   opacity: 1; }
        }

        /* === WRONG ANSWERS REVIEW === */
        .wrong-review { width: 100%; margin-top: 28px; }
        .wrong-review-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 14px;
            color: #fca5a5;
        }
        .wrong-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .wrong-grid::-webkit-scrollbar { width: 4px; }
        .wrong-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 2px; }
        .wrong-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        .wrong-item {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 14px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
        }
        .wrong-item img {
            width: 100%;
            max-height: 56px;
            object-fit: contain;
            border-radius: 6px;
        }
        .wrong-correct { font-size: 0.78rem; font-weight: 700; color: #86efac; text-align: center; }
        .wrong-mine    { font-size: 0.72rem; color: #fca5a5; text-align: center; opacity: 0.85; }
        .perfect-msg   { color: #86efac; font-size: 1.1rem; padding: 16px 0; }
        .outline-mode .wrong-item img {
            filter: invert(1) brightness(1.9) contrast(1.1);
        }
    </style>
</head>

<body class="{% if category_id == 2 %}outline-mode{% endif %}">
    <canvas id="particles-canvas"></canvas>
    
    <div class="wrapper">
        <div class="header">
            <a href="/" class="back-btn">← Nazad</a>
            <h2 class="quiz-title">🌍 Geo Kviz</h2>
            <div class="stats">
                <div id="progress" class="progress">1/20</div>
                <div id="streak" class="streak">🔥 0</div>
                <div id="score" class="score">Score: 0</div>
                <div id="timer" class="timer">⏳ 12s</div>
            </div>
        </div>

        <div class="main-content">
            <div id="qimage" class="image-container">
                <div class="loading-text">
                    <span class="loading-spinner">🌍</span>
                    Učitavam pitanje...
                </div>
            </div>
            
            <div id="options" class="options-grid"></div>

            <div class="actions">
                <div class="message" id="msg"></div>
                <button class="next-btn" id="nextBtn">Sljedeće pitanje ➡️</button>
            </div>
            
            <!-- FINISH SCREEN -->
            <div class="finish-screen" id="finishScreen">
                <div class="finish-content">
                    <h1 class="finish-title">🎉 Kviz završen!</h1>
                    <div class="final-score" id="finalScore">0</div>
                    <div class="quiz-stats">
                        <div class="stat-card">
                            <div class="stat-value" id="correctAnswers">0</div>
                            <div class="stat-label">Tačno</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="wrongAnswers">0</div>
                            <div class="stat-label">Netačno</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="accuracy">0%</div>
                            <div class="stat-label">Tačnost</div>
                        </div>
                    </div>
                    <div class="finish-actions">
                        <button class="play-again-btn" onclick="restartQuiz()">🔄 Igraj ponovo</button>
                        <button class="home-btn" onclick="window.location.href='/'">🏠 Početna</button>
                    </div>
                    <div class="wrong-review" id="wrongReview"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categoryId = {{ category_id | tojson }};
        let current = null;
        let locked = false;
        let score = 0;
        let currentQuestion = 1;
        let correctCount = 0;
        let wrongCount = 0;
        let usedQuestionIds = new Set();
        let streak = 0;
        let wrongAnswersList = [];
        let selectedRegion = '';

        const TOTAL_QUESTIONS = 20;
        const TIME_LIMIT = 60;
        let tLeft = TIME_LIMIT, timerId = null;

        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const msgEl = document.getElementById('msg');
        const progressEl = document.getElementById('progress');

        // === PARTICLES SISTEM ===
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2 + 1,
                opacity: Math.random() * 0.5 + 0.2
            };
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push(createParticle());
            }
        }

        function updateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(particle => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                
                if (particle.x < 0 || particle.x > canvas.width) particle.vx *= -1;
                if (particle.y < 0 || particle.y > canvas.height) particle.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${particle.opacity})`;
                ctx.fill();
                
                // Connecting lines
                particles.forEach(other => {
                    const dx = particle.x - other.x;
                    const dy = particle.y - other.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 100) {
                        ctx.beginPath();
                        ctx.moveTo(particle.x, particle.y);
                        ctx.lineTo(other.x, other.y);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 * (1 - distance / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                });
            });
            
            requestAnimationFrame(updateParticles);
        }

        // Init particles
        resizeCanvas();
        initParticles();
        updateParticles();
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        // === QUIZ LOGIKA ===
        async function loadQuestion() {
            // Provjeri da li je kviz završen
            if (currentQuestion > TOTAL_QUESTIONS) {
                finishQuiz();
                return;
            }
            
            stopTimer();
            locked = false;
            msgEl.textContent = '';
            msgEl.className = 'message';

            // Update progress
            progressEl.textContent = `${currentQuestion}/${TOTAL_QUESTIONS}`;

            try {
                // Loading animacija
                document.getElementById('qimage').innerHTML = `
                    <div class="loading-text">
                        <span class="loading-spinner">🌍</span>
                        Učitavam pitanje...
                    </div>
                `;
                document.getElementById('options').innerHTML = '';

                // Server filtrira već viđena pitanja preko `exclude` parametra
                const exclude = encodeURIComponent([...usedQuestionIds].join(','));
                const res = await fetch(`/api/random_question/${categoryId}?region=${selectedRegion}&exclude=${exclude}`);
                if (!res.ok) throw new Error('Greška pri učitavanju pitanja');
                const q = await res.json();

                usedQuestionIds.add(q.id);
                current = q;

                // Animiraj promenu slike
                await new Promise(resolve => setTimeout(resolve, 300));

                const qimg = document.getElementById('qimage');
                qimg.innerHTML = `<img id="quiz-img" src="${q.image_path}" alt="Slika pitanja">`;

                const img = document.getElementById('quiz-img');
                // start state (za animaciju)
                img.style.opacity = '0';
                img.style.transform = 'scale(0.98)';

                const reveal = () => {
                  requestAnimationFrame(() => {
                    img.style.transition = 'opacity .45s ease, transform .45s ease';
                    img.style.opacity = '1';
                    img.style.transform = 'scale(1)';
                  });
                };

                // ako je već učitana (keš), onload neće okinuti – obradi odmah
                if (img.complete) {
                  reveal();
                } else {
                  img.addEventListener('load', reveal, { once: true });
                }

                // hard-fallback za svaki slučaj (npr. neki edge slučajevi sa SVG)
                setTimeout(reveal, 350);

                // debug – vidi putanju u konzoli
                console.log('image_path:', q.image_path);

                // Opcije sa staggered animacijom
                const cont = document.getElementById('options');
                cont.innerHTML = '';
                
                q.options.forEach((opt, index) => {
                    const b = document.createElement('button');
                    b.className = 'option-btn';
                    b.textContent = opt;
                    b.onclick = () => check(opt, b);
                    b.style.opacity = '0';
                    b.style.transform = 'translateY(20px)';
                    cont.appendChild(b);
                    
                    setTimeout(() => {
                        b.style.transition = 'all 0.4s ease';
                        b.style.opacity = '1';
                        b.style.transform = 'translateY(0)';
                    }, index * 100 + 200);
                });

                // Start timer
                tLeft = TIME_LIMIT;
                updateTimerDisplay();
                startTimer();

            } catch (error) {
                console.error('Greška:', error);
                document.getElementById('qimage').innerHTML = 
                    `<div style="color: #ef4444;">❌ Greška pri učitavanju pitanja</div>`;
            }
        }

        function startTimer() {
            timerId = setInterval(() => {
                tLeft -= 1;
                updateTimerDisplay();
                if (tLeft <= 0) {
                    stopTimer();
                    if (!locked) check('', null, true);
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
        }

        function updateTimerDisplay() {
            timerEl.textContent = `⏳ ${tLeft}s`;
            const progress = (tLeft / TIME_LIMIT) * 100;
            timerEl.style.setProperty('--progress', `${progress}%`);
            
            // Color changes based on time left
            if (tLeft <= 3) {
                timerEl.style.color = '#ef4444';
            } else if (tLeft <= 6) {
                timerEl.style.color = '#f59e0b';
            } else {
                timerEl.style.color = '#ffffff';
            }
        }

        async function check(answer, btn, timeUp = false) {
            if (locked) return;
            locked = true;
            stopTimer();

            const time_used = TIME_LIMIT - Math.max(0, tLeft);

            try {
                const res = await fetch('/api/check', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        question_id: current.id,
                        answer: answer,
                        time_used: time_used
                    })
                });

                const data = await res.json();

                // Označi dugmad sa animacijom
                document.querySelectorAll('.option-btn').forEach(b => {
                    if (normalize(b.textContent) === normalize(data.correct_answer)) {
                        b.classList.add('option-correct');
                    }
                });
                
                if (btn && !data.correct) {
                    btn.classList.add('option-wrong');
                }

                // Streak + bodovanje
                if (data.correct) {
                    streak++;
                    updateStreakDisplay();
                    const mult = getStreakMultiplier();
                    const earned = Math.round((data.points || 0) * mult);
                    score += earned;
                    const multLabel = mult > 1 ? ` 🔥 ${mult}x` : '';
                    msgEl.textContent = `Tačno! +${earned} poena${multLabel} ✅`;
                    msgEl.className = 'message success';
                    correctCount++;
                    createCelebrationEffect();
                } else if (timeUp) {
                    streak = 0;
                    updateStreakDisplay();
                    wrongAnswersList.push({ img: current.image_path, correct: data.correct_answer, mine: null });
                    msgEl.textContent = `⏰ Isteklo vrijeme! Tačno: ${data.correct_answer}`;
                    msgEl.className = 'message timeout';
                    wrongCount++;
                } else {
                    streak = 0;
                    updateStreakDisplay();
                    wrongAnswersList.push({ img: current.image_path, correct: data.correct_answer, mine: answer });
                    msgEl.textContent = `❌ Netačno. Tačno: ${data.correct_answer}`;
                    msgEl.className = 'message error';
                    wrongCount++;
                }

                scoreEl.textContent = `Score: ${score}`;
                scoreEl.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    scoreEl.style.transform = 'scale(1)';
                }, 200);

                // Update button text for next question or finish
                currentQuestion++;
                if (currentQuestion <= TOTAL_QUESTIONS) {
                    document.getElementById('nextBtn').textContent = `Sljedeće pitanje (${currentQuestion}/${TOTAL_QUESTIONS}) ➡️`;
                } else {
                    document.getElementById('nextBtn').textContent = `Završi kviz 🏁`;
                }

            } catch (error) {
                console.error('Greška:', error);
                msgEl.textContent = '❌ Greška pri provjeri odgovora';
                msgEl.className = 'message error';
                wrongCount++;
            }
        }

        function finishQuiz() {
            console.log('Finishing quiz...'); // Debug
            
            // Sakri sve postojeće elementi main-content-a
            document.getElementById('qimage').style.display = 'none';
            document.getElementById('options').style.display = 'none';
            document.querySelector('.actions').style.display = 'none';
            
            // Prikaži finish screen
            const finishScreen = document.getElementById('finishScreen');
            finishScreen.style.display = 'flex';
            finishScreen.classList.add('show');
            
            // Update final statistics
            document.getElementById('finalScore').textContent = score;
            document.getElementById('correctAnswers').textContent = correctCount;
            document.getElementById('wrongAnswers').textContent = wrongCount;
            
            const accuracy = correctCount > 0 ? Math.round((correctCount / TOTAL_QUESTIONS) * 100) : 0;
            document.getElementById('accuracy').textContent = `${accuracy}%`;
            
            console.log(`Final stats: ${correctCount}/${TOTAL_QUESTIONS}, Score: ${score}, Accuracy: ${accuracy}%`); // Debug
            
            submitToLeaderboard();
            renderWrongAnswers();
            createMegaCelebrationEffect();
        }

        async function submitToLeaderboard() {
            try {
                const res = await fetch('/api/submit_score', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        category_id: categoryId,
                        score: score,
                        correct_answers: correctCount,
                        total_questions: TOTAL_QUESTIONS,
                        accuracy: Math.round((correctCount / TOTAL_QUESTIONS) * 100)
                    })
                });
                
                if (res.ok) {
                    console.log('Rezultat uspešno poslat na leaderboard');
                } else {
                    console.warn('Greška pri slanju na leaderboard');
                }
            } catch (error) {
                console.error('Greška pri slanju na leaderboard:', error);
            }
        }

        function restartQuiz() {
            current = null;
            locked = false;
            score = 0;
            currentQuestion = 1;
            correctCount = 0;
            wrongCount = 0;
            streak = 0;
            wrongAnswersList = [];
            usedQuestionIds.clear();
            tLeft = TIME_LIMIT;
            
            // Reset UI elemenata
            scoreEl.textContent = 'Score: 0';
            progressEl.textContent = '1/20';
            msgEl.textContent = '';
            msgEl.className = 'message';
            document.getElementById('nextBtn').textContent = 'Sljedeće pitanje ➡️';
            
            // Sakrij finish screen i prikaži glavni sadržaj
            const finishScreen = document.getElementById('finishScreen');
            finishScreen.style.display = 'none';
            finishScreen.classList.remove('show');
            
            document.getElementById('qimage').style.display = 'flex';
            document.getElementById('options').style.display = 'grid';
            document.querySelector('.actions').style.display = 'flex';
            document.getElementById('wrongReview').innerHTML = '';
            updateStreakDisplay();

            document.getElementById('regionOverlay').style.display = 'flex';
        }

        function createCelebrationEffect() {
            // Stvori više particles za celebration
            for (let i = 0; i < 20; i++) {
                const particle = {
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    size: Math.random() * 4 + 2,
                    opacity: 1,
                    life: 60,
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`
                };
                particles.push(particle);
                
                setTimeout(() => {
                    const index = particles.indexOf(particle);
                    if (index > -1) particles.splice(index, 1);
                }, 2000);
            }
        }

        function createMegaCelebrationEffect() {
            // Mega celebration za završetak kviza
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const particle = {
                        x: Math.random() * canvas.width,
                        y: canvas.height + 50,
                        vx: (Math.random() - 0.5) * 8,
                        vy: -(Math.random() * 15 + 10),
                        size: Math.random() * 6 + 3,
                        opacity: 1,
                        life: 120,
                        color: `hsl(${Math.random() * 360}, 70%, 60%)`
                    };
                    particles.push(particle);
                    
                    setTimeout(() => {
                        const index = particles.indexOf(particle);
                        if (index > -1) particles.splice(index, 1);
                    }, 4000);
                }, i * 50);
            }
        }

        function normalize(s) {
            return (s || '').toString().trim().toLowerCase();
        }

        // Event listeners
        document.getElementById('nextBtn').onclick = loadQuestion;

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '4' && !locked && currentQuestion <= TOTAL_QUESTIONS) {
                const options = document.querySelectorAll('.option-btn');
                const index = parseInt(e.key) - 1;
                if (options[index]) {
                    options[index].click();
                }
            } else if (e.key === 'Enter' && locked && currentQuestion <= TOTAL_QUESTIONS) {
                loadQuestion();
            } else if (e.key === 'r' && currentQuestion > TOTAL_QUESTIONS) {
                restartQuiz();
            }
        });

        // Pokaži region overlay na startu (overlay HTML mora biti u DOM-u, koristimo DOMContentLoaded)
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('regionOverlay').style.display = 'flex';
        });

        // === REGION, STREAK, WRONG ANSWERS ===

        function startWithRegion(region) {
            selectedRegion = region;
            document.getElementById('regionOverlay').style.display = 'none';
            loadQuestion();
        }

        function getStreakMultiplier() {
            if (streak >= 7) return 2.5;
            if (streak >= 5) return 2.0;
            if (streak >= 3) return 1.5;
            return 1.0;
        }

        function updateStreakDisplay() {
            const el = document.getElementById('streak');
            if (streak >= 3) {
                el.textContent = `🔥 ${streak}x`;
                el.classList.add('active');
            } else if (streak > 0) {
                el.textContent = `⚡ ${streak}`;
                el.classList.add('active');
            } else {
                el.textContent = '';
                el.classList.remove('active');
            }
        }

        function renderWrongAnswers() {
            const container = document.getElementById('wrongReview');
            if (wrongAnswersList.length === 0) {
                container.innerHTML = '<div class="perfect-msg">🏆 Perfektan rezultat — sve tačno!</div>';
                return;
            }
            const items = wrongAnswersList.map(w => `
                <div class="wrong-item">
                    <img src="${w.img}" alt="">
                    <div class="wrong-correct">✅ ${w.correct}</div>
                    <div class="wrong-mine">${w.mine ? '❌ ' + w.mine : '⏰ Isteklo'}</div>
                </div>
            `).join('');
            container.innerHTML = `
                <div class="wrong-review-title">❌ Pogrešni odgovori (${wrongAnswersList.length})</div>
                <div class="wrong-grid">${items}</div>
            `;
        }

        // Console info
        console.log('🎮 Moderni Geo Kviz učitan!');
        console.log('⌨️  Koristite tipke 1-4 za brže odgovaranje');
        console.log('🎯 20 pitanja do kraja!');
    </script>
    <!-- REGION OVERLAY -->
    <div class="region-overlay" id="regionOverlay" style="display:none">
        <div class="region-content">
            <div class="region-title">🌍 Odaberi region</div>
            <p class="region-subtitle">Možeš igrati sve zastave ili se fokusirati na jedan kontinent</p>
            <div class="region-grid">
                <button class="region-btn" onclick="startWithRegion('')">🌐 Sve</button>
                <button class="region-btn" onclick="startWithRegion('europa')">🇪🇺 Europa</button>
                <button class="region-btn" onclick="startWithRegion('azija')">🌏 Azija</button>
                <button class="region-btn" onclick="startWithRegion('afrika')">🌍 Afrika</button>
                <button class="region-btn" onclick="startWithRegion('amerike')">🌎 Amerike</button>
                <button class="region-btn" onclick="startWithRegion('okeanija')">🌊 Okeanija</button>
            </div>
        </div>
    </div>
</body>
</html>
