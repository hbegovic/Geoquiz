<!DOCTYPE html>
<html lang="hr">
<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PFWL6447DH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PFWL6447DH');
    </script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>⚔️ Geo Duel</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:system-ui,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f0f23 0%,#1a1a3e 25%,#2d1b69 50%,#7c3aed 100%);min-height:100vh;color:#fff;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(120,119,198,.3) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(255,118,117,.3) 0%,transparent 50%);animation:gs 20s ease-in-out infinite;z-index:-1}
        @keyframes gs{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.8;transform:scale(1.1)}}
        .wrapper{max-width:1000px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column}
        .header{display:flex;align-items:center;gap:20px;margin-bottom:30px;flex-wrap:wrap}
        .back-btn{color:#c7d2fe;text-decoration:none;font-size:1.1rem;font-weight:600;padding:12px 20px;border-radius:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(10px);transition:all .3s ease}
        .back-btn:hover{background:rgba(255,255,255,.15);transform:translateY(-2px)}
        .quiz-title{font-size:clamp(1.5rem,4vw,2rem);font-weight:800;background:linear-gradient(45deg,#fff,#c7d2fe,#fbbf24);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gt 3s ease-in-out infinite}
        @keyframes gt{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        .stats{margin-left:auto;display:flex;gap:15px;align-items:center}
        .score,.timer,.progress{padding:8px 16px;border-radius:20px;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);font-weight:600;border:1px solid rgba(255,255,255,.2)}
        .timer{position:relative;overflow:hidden}
        .timer::before{content:'';position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,#fbbf24,#f59e0b);width:var(--progress,100%);transition:width 1s linear;border-radius:20px;z-index:-1}
        .streak{padding:8px 16px;border-radius:20px;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.35);color:#fbbf24;font-weight:700;display:none}
        .streak.active{display:block;animation:sp .4s cubic-bezier(.4,0,.2,1)}
        @keyframes sp{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

        .main-content{flex:1;display:flex;flex-direction:column;gap:24px}

        /* QUESTION */
        .question-box{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:20px;padding:20px 28px;text-align:center;backdrop-filter:blur(20px)}
        .metric-icon{font-size:2rem;margin-bottom:8px}
        .question-text{font-size:1.3rem;font-weight:800;background:linear-gradient(45deg,#fff,#c7d2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

        /* DUEL AREA */
        .duel-area{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center}
        .vs-badge{font-size:2rem;font-weight:900;color:rgba(255,255,255,.4);text-align:center;padding:0 8px}

        .country-btn{background:rgba(255,255,255,.07);border:3px solid rgba(255,255,255,.15);border-radius:24px;padding:28px 20px;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;align-items:center;gap:14px;position:relative;overflow:hidden;width:100%}
        .country-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(45deg,rgba(124,58,237,.1),rgba(59,130,246,.1));opacity:0;transition:opacity .3s ease;border-radius:21px}
        .country-btn:hover{transform:translateY(-6px) scale(1.02);border-color:rgba(255,255,255,.35);box-shadow:0 20px 40px rgba(0,0,0,.35)}
        .country-btn:hover::before{opacity:1}
        .country-btn:active{transform:translateY(-3px) scale(1.01)}
        .country-btn:disabled{cursor:not-allowed}

        .cb-flag{max-width:220px;max-height:140px;object-fit:contain;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.3);transition:transform .3s ease;animation:fi .4s ease}
        @keyframes fi{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
        .cb-emoji{font-size:3.5rem;display:none}
        .cb-name{font-size:1.4rem;font-weight:800;text-align:center;background:linear-gradient(45deg,#fff,#c7d2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

        /* RESULTS */
        .country-btn.correct{border-color:#22c55e!important;background:rgba(34,197,94,.15)!important;animation:glow-green .6s ease}
        .country-btn.wrong{border-color:#ef4444!important;background:rgba(239,68,68,.15)!important;animation:glow-red .5s ease}
        @keyframes glow-green{0%{box-shadow:none}50%{box-shadow:0 0 40px rgba(34,197,94,.6)}100%{box-shadow:0 0 20px rgba(34,197,94,.3)}}
        @keyframes glow-red{0%{box-shadow:none}50%{box-shadow:0 0 40px rgba(239,68,68,.5)}100%{box-shadow:0 0 10px rgba(239,68,68,.2)}}
        .result-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3rem;border-radius:21px;opacity:0;transition:opacity .3s ease;background:rgba(0,0,0,.15)}
        .result-overlay.show{opacity:1}

        .message{min-height:48px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:600;text-align:center;padding:14px;border-radius:16px;backdrop-filter:blur(10px);transition:all .3s ease}
        .message.success{background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.3);color:#86efac;animation:su .5s ease}
        .message.error{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.3);color:#fca5a5;animation:su .5s ease}
        .message.timeout{background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.3);color:#fcd34d;animation:su .5s ease}
        @keyframes su{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}

        .actions{display:flex;flex-direction:column;gap:16px;align-items:center}
        .next-btn{padding:14px 28px;border-radius:18px;border:none;background:linear-gradient(45deg,#3b82f6,#1d4ed8);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s ease;box-shadow:0 8px 20px rgba(59,130,246,.3)}
        .next-btn:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(59,130,246,.4)}

        /* FINISH */
        .finish-screen{position:fixed;inset:0;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1000;padding:40px;overflow-y:auto}
        .finish-screen.show{display:flex!important;animation:su .6s ease}
        .finish-content{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:24px;padding:40px;backdrop-filter:blur(20px);text-align:center;max-width:600px;width:100%}
        .finish-title{font-size:2.5rem;font-weight:800;background:linear-gradient(45deg,#fbbf24,#f59e0b,#d97706);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gt 3s ease-in-out infinite}
        .final-score{font-size:3rem;font-weight:900;color:#22c55e;text-shadow:0 0 20px rgba(34,197,94,.5);margin:16px 0}
        .quiz-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:0 auto 24px}
        .stat-card{background:rgba(255,255,255,.1);padding:16px;border-radius:14px;border:1px solid rgba(255,255,255,.2)}
        .stat-value{font-size:1.7rem;font-weight:700;color:#60a5fa}
        .stat-label{font-size:.82rem;opacity:.8;margin-top:4px}
        .finish-actions{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
        .play-again-btn,.home-btn{padding:14px 26px;border-radius:16px;border:none;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s ease}
        .play-again-btn{background:linear-gradient(45deg,#22c55e,#16a34a);color:#fff}
        .home-btn{background:linear-gradient(45deg,#6b7280,#4b5563);color:#fff}
        .wrong-review{width:100%;margin-top:24px}
        .wrong-review-title{font-size:1rem;font-weight:700;margin-bottom:12px;color:#fca5a5;text-align:center}
        .wrong-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;max-height:240px;overflow-y:auto}
        .wrong-grid::-webkit-scrollbar{width:4px}
        .wrong-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
        .wrong-item{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:12px;padding:12px;display:flex;gap:10px;align-items:center}
        .wi-flags{display:flex;gap:6px}
        .wi-flag{height:28px;object-fit:contain;border-radius:4px}
        .wi-info{flex:1;text-align:left}
        .wi-q{font-size:.72rem;opacity:.6;margin-bottom:2px}
        .wi-correct{font-size:.8rem;font-weight:700;color:#86efac}
        .wi-wrong{font-size:.75rem;color:#fca5a5}
        .perfect-msg{color:#86efac;font-size:1.1rem;padding:16px 0;text-align:center}

        /* REGION */
        .region-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px}
        .region-content{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:28px;padding:48px 36px;backdrop-filter:blur(20px);text-align:center;max-width:580px;width:100%}
        .region-title{font-size:1.9rem;font-weight:800;margin-bottom:8px;background:linear-gradient(45deg,#fff,#c7d2fe,#fbbf24);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gt 3s ease-in-out infinite}
        .region-subtitle{opacity:.65;margin-bottom:28px;font-size:.95rem}
        .region-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
        .region-btn{padding:16px 12px;border-radius:16px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1)}
        .region-btn:hover{transform:translateY(-4px) scale(1.04);border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.15)}

        @media(max-width:700px){.duel-area{grid-template-columns:1fr;}.vs-badge{font-size:1.5rem;padding:8px 0}.cb-flag{max-width:160px;max-height:100px}}
        @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <a href="/" class="back-btn">← Nazad</a>
        <h2 class="quiz-title">⚔️ Geo Duel</h2>
        <div class="stats">
            <div id="progress" class="progress">1/20</div>
            <div id="streak" class="streak"></div>
            <div id="score" class="score">Score: 0</div>
            <div id="timer" class="timer">⏳ 15s</div>
        </div>
    </div>
    <div class="main-content">
        <div class="question-box" id="questionBox">
            <div class="metric-icon" id="metricIcon">⚔️</div>
            <div class="question-text" id="questionText">Učitavam...</div>
        </div>
        <div class="duel-area">
            <button class="country-btn" id="btnA" onclick="pick('a')">
                <img class="cb-flag" id="flagA" src="" alt="">
                <div class="cb-emoji" id="emojiA">🌍</div>
                <div class="cb-name" id="nameA">...</div>
                <div class="result-overlay" id="overlayA"></div>
            </button>
            <div class="vs-badge">VS</div>
            <button class="country-btn" id="btnB" onclick="pick('b')">
                <img class="cb-flag" id="flagB" src="" alt="">
                <div class="cb-emoji" id="emojiB">🌍</div>
                <div class="cb-name" id="nameB">...</div>
                <div class="result-overlay" id="overlayB"></div>
            </button>
        </div>
        <div class="actions">
            <div class="message" id="msg"></div>
            <button class="next-btn" id="nextBtn" style="display:none">Sljedeće ➡️</button>
        </div>
        <div class="finish-screen" id="finishScreen">
            <div class="finish-content">
                <h1 class="finish-title">🎉 Kviz završen!</h1>
                <div class="final-score" id="finalScore">0</div>
                <div class="quiz-stats">
                    <div class="stat-card"><div class="stat-value" id="stCorrect">0</div><div class="stat-label">Tačno</div></div>
                    <div class="stat-card"><div class="stat-value" id="stWrong">0</div><div class="stat-label">Netačno</div></div>
                    <div class="stat-card"><div class="stat-value" id="stAcc">0%</div><div class="stat-label">Tačnost</div></div>
                </div>
                <div class="finish-actions">
                    <button class="play-again-btn" onclick="restartQuiz()">🔄 Igraj ponovo</button>
                    <button class="home-btn" onclick="window.location.href='/'">🏠 Početna</button>
                </div>
                <div class="wrong-review" id="wrongReview"></div>
            </div>
        </div>
    </div>
</div>

<div class="region-overlay" id="regionOverlay" style="display:none">
    <div class="region-content">
        <div class="region-title">⚔️ Geo Duel</div>
        <p class="region-subtitle">Koja zemlja ima više? Pogodi u sekundama!</p>
        <div class="region-grid">
            <button class="region-btn" onclick="startWithRegion('')">🌐 Sve</button>
            <button class="region-btn" onclick="startWithRegion('europa')">🇪🇺 Europa</button>
            <button class="region-btn" onclick="startWithRegion('azija')">🌏 Azija</button>
            <button class="region-btn" onclick="startWithRegion('afrika')">🌍 Afrika</button>
            <button class="region-btn" onclick="startWithRegion('amerike')">🌎 Amerike</button>
            <button class="region-btn" onclick="startWithRegion('okeanija')">🌊 Okeanija</button>
        </div>
    </div>
</div>

<script>
    let current=null,locked=false,score=0,currentQuestion=1,correctCount=0,wrongCount=0;
    let streak=0,wrongList=[],selectedRegion='';
    let usedPairs=new Set();
    const TOTAL=20,TIME=15;
    let tLeft=TIME,timerId=null;
    const scoreEl=document.getElementById('score'),timerEl=document.getElementById('timer'),msgEl=document.getElementById('msg'),progEl=document.getElementById('progress');

    function setFlag(id,emojiId,url,emoji){
        const img=document.getElementById(id);
        img.style.display='block';
        img.src=url;
        img.onerror=()=>{img.style.display='none';document.getElementById(emojiId).style.display='block'};
        document.getElementById(emojiId).style.display='none';
    }

    async function loadQuestion(){
        if(currentQuestion>TOTAL){finishQuiz();return}
        stopTimer();locked=false;msgEl.textContent='';msgEl.className='message';
        progEl.textContent=`${currentQuestion}/${TOTAL}`;

        ['btnA','btnB'].forEach(id=>{
            const btn=document.getElementById(id);
            btn.disabled=false;btn.className='country-btn';
            btn.querySelector('.result-overlay').className='result-overlay';
            btn.querySelector('.result-overlay').textContent='';
        });
        document.getElementById('nextBtn').style.display='none';
        document.getElementById('questionText').textContent='Učitavam...';
        document.getElementById('metricIcon').textContent='⚔️';

        try{
            const exclude=encodeURIComponent([...usedPairs].join(','));
            const res=await fetch(`/api/comparison_question?region=${selectedRegion}&exclude=${exclude}`);
            if(!res.ok)throw new Error(`HTTP ${res.status}`);
            const q=await res.json();
            if(q.error)throw new Error(q.error);
            if(q.country_a&&q.country_b){
                const pair=[q.country_a.code.toLowerCase(),q.country_b.code.toLowerCase()].sort().join(':');
                usedPairs.add(pair);
            }
            current=q;
            await new Promise(r=>setTimeout(r,200));

            document.getElementById('metricIcon').textContent=q.metric_icon;
            document.getElementById('questionText').textContent=q.question;
            setFlag('flagA','emojiA',q.country_a.flag_url,q.country_a.emoji);
            setFlag('flagB','emojiB',q.country_b.flag_url,q.country_b.emoji);
            document.getElementById('nameA').textContent=q.country_a.name;
            document.getElementById('nameB').textContent=q.country_b.name;

            tLeft=TIME;updateTimer();startTimer();
        }catch(err){
            document.getElementById('questionText').textContent=`❌ ${err.message}`;
        }
    }

    function pick(side,timeUp=false){
        if(locked)return;locked=true;stopTimer();
        const timeUsed=TIME-Math.max(0,tLeft);
        const picked = timeUp?null:side;
        const correctSide=current.correct_code===current.country_a.code?'a':'b';
        const isCorrect=picked===correctSide;

        // Visual feedback
        const correctBtn=document.getElementById(`btn${correctSide.toUpperCase()}`);
        correctBtn.classList.add('correct');
        correctBtn.querySelector('.result-overlay').textContent='✅';
        correctBtn.querySelector('.result-overlay').classList.add('show');

        if(picked&&!isCorrect){
            const wrongBtn=document.getElementById(`btn${side.toUpperCase()}`);
            wrongBtn.classList.add('wrong');
            wrongBtn.querySelector('.result-overlay').textContent='❌';
            wrongBtn.querySelector('.result-overlay').classList.add('show');
        }
        ['btnA','btnB'].forEach(id=>document.getElementById(id).disabled=true);

        if(isCorrect){
            streak++;updateStreak();
            const mult=getMult(),bonus=Math.max(0,50-Math.floor(timeUsed*5));
            const earned=Math.round((100+bonus)*mult);
            score+=earned;
            msgEl.textContent=`Tačno! +${earned}${mult>1?' 🔥 '+mult+'x':''} ✅`;msgEl.className='message success';
            correctCount++;
        }else if(timeUp){
            streak=0;updateStreak();
            wrongList.push({q:current.question,icon:current.metric_icon,
                correctName:current.correct_code===current.country_a.code?current.country_a.name:current.country_b.name,
                flagA:current.country_a.flag_url,flagB:current.country_b.flag_url,
                nameA:current.country_a.name,nameB:current.country_b.name,yours:null});
            msgEl.textContent=`⏰ Isteklo! Trebalo: ${current.correct_code===current.country_a.code?current.country_a.name:current.country_b.name}`;
            msgEl.className='message timeout';wrongCount++;
        }else{
            streak=0;updateStreak();
            const yourName=side==='a'?current.country_a.name:current.country_b.name;
            const correctName=current.correct_code===current.country_a.code?current.country_a.name:current.country_b.name;
            wrongList.push({q:current.question,icon:current.metric_icon,
                correctName,flagA:current.country_a.flag_url,flagB:current.country_b.flag_url,
                nameA:current.country_a.name,nameB:current.country_b.name,yours:yourName});
            msgEl.textContent=`❌ Tačno: ${correctName}`;msgEl.className='message error';wrongCount++;
        }

        scoreEl.textContent=`Score: ${score}`;scoreEl.style.transform='scale(1.1)';setTimeout(()=>scoreEl.style.transform='scale(1)',200);
        currentQuestion++;
        const nextBtn=document.getElementById('nextBtn');
        nextBtn.style.display='block';
        nextBtn.textContent=currentQuestion<=TOTAL?`Sljedeće (${currentQuestion}/${TOTAL}) ➡️`:'Završi kviz 🏁';
    }

    function startTimer(){timerId=setInterval(()=>{tLeft--;updateTimer();if(tLeft<=0){stopTimer();if(!locked)pick(null,true)}},1000)}
    function stopTimer(){clearInterval(timerId);timerId=null}
    function updateTimer(){timerEl.textContent=`⏳ ${tLeft}s`;timerEl.style.setProperty('--progress',`${tLeft/TIME*100}%`);timerEl.style.color=tLeft<=3?'#ef4444':tLeft<=6?'#f59e0b':'#fff'}

    function finishQuiz(){
        document.querySelector('.question-box').style.display='none';
        document.querySelector('.duel-area').style.display='none';
        document.querySelector('.actions').style.display='none';
        const fs=document.getElementById('finishScreen');fs.style.display='flex';fs.classList.add('show');
        document.getElementById('finalScore').textContent=score;
        document.getElementById('stCorrect').textContent=correctCount;
        document.getElementById('stWrong').textContent=wrongCount;
        document.getElementById('stAcc').textContent=`${Math.round(correctCount/TOTAL*100)}%`;
        renderWrong();
        fetch('/api/submit_score',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({category_id:9,score,correct_answers:correctCount,total_questions:TOTAL,accuracy:Math.round(correctCount/TOTAL*100)})}).catch(()=>{});
    }

    function restartQuiz(){
        current=null;locked=false;score=0;currentQuestion=1;correctCount=0;wrongCount=0;streak=0;wrongList=[];usedPairs.clear();tLeft=TIME;
        scoreEl.textContent='Score: 0';progEl.textContent='1/20';msgEl.textContent='';msgEl.className='message';
        document.getElementById('nextBtn').style.display='none';
        const fs=document.getElementById('finishScreen');fs.style.display='none';fs.classList.remove('show');
        document.querySelector('.question-box').style.display='';
        document.querySelector('.duel-area').style.display='';
        document.querySelector('.actions').style.display='flex';
        document.getElementById('wrongReview').innerHTML='';
        updateStreak();
        document.getElementById('regionOverlay').style.display='flex';
    }

    function renderWrong(){
        const el=document.getElementById('wrongReview');
        if(!wrongList.length){el.innerHTML='<div class="perfect-msg">🏆 Sve tačno!</div>';return}
        el.innerHTML=`<div class="wrong-review-title">❌ Pogrešni (${wrongList.length})</div>
        <div class="wrong-grid">${wrongList.map(w=>`
            <div class="wrong-item">
                <div class="wi-flags">
                    <img class="wi-flag" src="${w.flagA}" onerror="this.style.display='none'" alt="${w.nameA}">
                    <img class="wi-flag" src="${w.flagB}" onerror="this.style.display='none'" alt="${w.nameB}">
                </div>
                <div class="wi-info">
                    <div class="wi-q">${w.icon} ${w.q.replace('Koja država','').replace('?','').trim()}</div>
                    <div class="wi-correct">✅ ${w.correctName}</div>
                    <div class="wi-wrong">${w.yours?'❌ '+w.yours:'⏰ Isteklo'}</div>
                </div>
            </div>`).join('')}</div>`;
    }

    function startWithRegion(r){selectedRegion=r;document.getElementById('regionOverlay').style.display='none';loadQuestion()}
    function getMult(){if(streak>=7)return 2.5;if(streak>=5)return 2;if(streak>=3)return 1.5;return 1}
    function updateStreak(){const el=document.getElementById('streak');if(streak>=3){el.textContent=`🔥 ${streak}x`;el.classList.add('active')}else if(streak>0){el.textContent=`⚡ ${streak}`;el.classList.add('active')}else{el.textContent='';el.classList.remove('active')}}

    document.getElementById('nextBtn').onclick=loadQuestion;
    document.addEventListener('keydown',e=>{
        if(e.key==='ArrowLeft'&&!locked)pick('a');
        else if(e.key==='ArrowRight'&&!locked)pick('b');
        else if(e.key==='Enter'&&locked&&currentQuestion<=TOTAL)loadQuestion();
    });
    document.addEventListener('DOMContentLoaded',()=>document.getElementById('regionOverlay').style.display='flex');
</script>
</body>
</html>
