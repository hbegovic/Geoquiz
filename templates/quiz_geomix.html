<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>🧩 Geo Ekspert</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:system-ui,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f0f23 0%,#1a1a3e 25%,#2d1b69 50%,#7c3aed 100%);min-height:100vh;color:#fff;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(120,119,198,.3) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(255,118,117,.3) 0%,transparent 50%),radial-gradient(circle at 40% 60%,rgba(59,130,246,.2) 0%,transparent 50%);animation:gs 20s ease-in-out infinite;z-index:-1}
        @keyframes gs{0%,100%{opacity:1;transform:scale(1) rotate(0deg)}50%{opacity:.8;transform:scale(1.1) rotate(180deg)}}
        .wrapper{max-width:900px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column}
        .header{display:flex;align-items:center;gap:20px;margin-bottom:30px;flex-wrap:wrap}
        .back-btn{color:#c7d2fe;text-decoration:none;font-size:1.1rem;font-weight:600;padding:12px 20px;border-radius:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(10px);transition:all .3s ease}
        .back-btn:hover{background:rgba(255,255,255,.15);transform:translateY(-2px)}
        .quiz-title{font-size:clamp(1.5rem,4vw,2rem);font-weight:800;background:linear-gradient(45deg,#fff,#c7d2fe,#fbbf24);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gt 3s ease-in-out infinite}
        @keyframes gt{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        .stats{margin-left:auto;display:flex;gap:15px;align-items:center}
        .score,.timer,.progress{padding:8px 16px;border-radius:20px;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);font-weight:600;border:1px solid rgba(255,255,255,.2)}
        .timer{position:relative;overflow:hidden}
        .timer::before{content:'';position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,#fbbf24,#f59e0b);width:var(--progress,100%);transition:width 1s linear;border-radius:20px;z-index:-1}
        .streak{padding:8px 16px;border-radius:20px;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.35);color:#fbbf24;font-weight:700;display:none}
        .streak.active{display:block;animation:sp .4s cubic-bezier(.4,0,.2,1)}
        @keyframes sp{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

        .main-content{flex:1;display:flex;flex-direction:column;gap:24px}

        /* COUNTRY CARD */
        .country-card{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:24px;padding:30px;backdrop-filter:blur(20px);text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;overflow:hidden}
        .country-card::before{content:'';position:absolute;inset:0;background:linear-gradient(45deg,rgba(124,58,237,.08),rgba(59,130,246,.08));border-radius:22px}
        .type-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-size:.85rem;font-weight:700;position:relative;z-index:1}
        .type-capital  {background:rgba(59,130,246,.25);border:1px solid rgba(59,130,246,.4);color:#93c5fd}
        .type-currency {background:rgba(234,179,8,.2);border:1px solid rgba(234,179,8,.4);color:#fde047}
        .type-phone    {background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.4);color:#86efac}
        .type-area     {background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#fca5a5}
        .flag-img{max-width:260px;max-height:160px;object-fit:contain;border-radius:10px;box-shadow:0 10px 28px rgba(0,0,0,.35);transition:transform .3s ease;position:relative;z-index:1;animation:fi .4s ease}
        @keyframes fi{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
        .flag-img:hover{transform:scale(1.03)}
        .country-emoji{font-size:3.5rem;position:relative;z-index:1;display:none}
        .country-name-display{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900;background:linear-gradient(45deg,#fff,#c7d2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:1}
        .question-label{font-size:1rem;opacity:.7;position:relative;z-index:1}

        /* OPTIONS */
        .options-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
        .option-btn{padding:18px;border-radius:18px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;backdrop-filter:blur(15px);transition:all .3s cubic-bezier(.4,0,.2,1);min-height:64px;display:flex;align-items:center;justify-content:center;text-align:center}
        .option-btn:hover{transform:translateY(-4px) scale(1.02);border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.15);box-shadow:0 12px 30px rgba(0,0,0,.3)}
        .option-correct{border-color:#22c55e!important;background:rgba(34,197,94,.2)!important;animation:cp .6s ease}
        .option-wrong{border-color:#ef4444!important;background:rgba(239,68,68,.2)!important;animation:sh .5s ease}
        @keyframes cp{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
        @keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

        .actions{display:flex;flex-direction:column;gap:16px;align-items:center}
        .message{min-height:48px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:600;text-align:center;padding:14px;border-radius:16px;backdrop-filter:blur(10px);transition:all .3s ease}
        .message.success{background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.3);color:#86efac;animation:su .5s ease}
        .message.error{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.3);color:#fca5a5;animation:su .5s ease}
        .message.timeout{background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.3);color:#fcd34d;animation:su .5s ease}
        @keyframes su{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
        .next-btn{padding:14px 28px;border-radius:18px;border:none;background:linear-gradient(45deg,#3b82f6,#1d4ed8);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s ease;box-shadow:0 8px 20px rgba(59,130,246,.3)}
        .next-btn:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(59,130,246,.4)}

        /* FINISH */
        .finish-screen{position:fixed;inset:0;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1000;padding:40px;overflow-y:auto}
        .finish-screen.show{display:flex!important;animation:su .6s ease}
        .finish-content{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:24px;padding:40px;backdrop-filter:blur(20px);text-align:center;max-width:640px;width:100%}
        .finish-title{font-size:2.5rem;font-weight:800;background:linear-gradient(45deg,#fbbf24,#f59e0b,#d97706);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gt 3s ease-in-out infinite}
        .final-score{font-size:3rem;font-weight:900;color:#22c55e;text-shadow:0 0 20px rgba(34,197,94,.5);margin:16px 0}
        .quiz-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin:0 auto 24px;max-width:500px}
        .stat-card{background:rgba(255,255,255,.1);padding:18px;border-radius:16px;border:1px solid rgba(255,255,255,.2)}
        .stat-value{font-size:1.8rem;font-weight:700;color:#60a5fa}
        .stat-label{font-size:.85rem;opacity:.8;margin-top:4px}
        .finish-actions{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
        .play-again-btn,.home-btn{padding:14px 28px;border-radius:18px;border:none;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s ease}
        .play-again-btn{background:linear-gradient(45deg,#22c55e,#16a34a);color:#fff}
        .home-btn{background:linear-gradient(45deg,#6b7280,#4b5563);color:#fff}
        .wrong-review{width:100%;margin-top:24px}
        .wrong-review-title{font-size:1rem;font-weight:700;margin-bottom:12px;color:#fca5a5;text-align:center}
        .wrong-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;max-height:260px;overflow-y:auto;padding-right:4px}
        .wrong-grid::-webkit-scrollbar{width:4px}
        .wrong-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
        .wrong-item{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:14px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:5px}
        .wi-flag{width:100%;max-height:48px;object-fit:contain;border-radius:6px}
        .wi-country{font-size:.8rem;font-weight:700;color:#e2e8f0;text-align:center}
        .wi-type{font-size:.7rem;opacity:.6;text-align:center}
        .wi-correct{font-size:.78rem;font-weight:700;color:#86efac;text-align:center}
        .wi-wrong{font-size:.72rem;color:#fca5a5;text-align:center}
        .perfect-msg{color:#86efac;font-size:1.1rem;padding:16px 0;text-align:center}

        /* REGION */
        .region-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px}
        .region-content{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:28px;padding:48px 36px;backdrop-filter:blur(20px);text-align:center;max-width:580px;width:100%}
        .region-title{font-size:1.9rem;font-weight:800;margin-bottom:8px;background:linear-gradient(45deg,#fff,#c7d2fe,#fbbf24);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gt 3s ease-in-out infinite}
        .region-subtitle{opacity:.65;margin-bottom:28px;font-size:.95rem}
        .region-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
        .region-btn{padding:16px 12px;border-radius:16px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1)}
        .region-btn:hover{transform:translateY(-4px) scale(1.04);border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.15)}

        @media(max-width:768px){.stats{margin-left:0;width:100%;justify-content:space-between}.options-grid{grid-template-columns:1fr}}
        @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <a href="/" class="back-btn">← Nazad</a>
        <h2 class="quiz-title">🧩 Geo Ekspert</h2>
        <div class="stats">
            <div id="progress" class="progress">1/20</div>
            <div id="streak" class="streak"></div>
            <div id="score" class="score">Score: 0</div>
            <div id="timer" class="timer">⏳ 20s</div>
        </div>
    </div>
    <div class="main-content">
        <div id="countryCard" class="country-card">
            <div class="country-emoji">🌍</div>
            <div class="country-name-display">Učitavam...</div>
        </div>
        <div id="options" class="options-grid"></div>
        <div class="actions">
            <div class="message" id="msg"></div>
            <button class="next-btn" id="nextBtn">Sljedeće pitanje ➡️</button>
        </div>
        <div class="finish-screen" id="finishScreen">
            <div class="finish-content">
                <h1 class="finish-title">🎉 Kviz završen!</h1>
                <div class="final-score" id="finalScore">0</div>
                <div class="quiz-stats">
                    <div class="stat-card"><div class="stat-value" id="stCorrect">0</div><div class="stat-label">Tačno</div></div>
                    <div class="stat-card"><div class="stat-value" id="stWrong">0</div><div class="stat-label">Netačno</div></div>
                    <div class="stat-card"><div class="stat-value" id="stAcc">0%</div><div class="stat-label">Tačnost</div></div>
                </div>
                <div class="finish-actions">
                    <button class="play-again-btn" onclick="restartQuiz()">🔄 Igraj ponovo</button>
                    <button class="home-btn" onclick="window.location.href='/'">🏠 Početna</button>
                </div>
                <div class="wrong-review" id="wrongReview"></div>
            </div>
        </div>
    </div>
</div>

<div class="region-overlay" id="regionOverlay" style="display:none">
    <div class="region-content">
        <div class="region-title">🧩 Geo Ekspert</div>
        <p class="region-subtitle">Mix: glavni gradovi, valute, pozivni brojevi, površine</p>
        <div class="region-grid">
            <button class="region-btn" onclick="startWithRegion('')">🌐 Sve</button>
            <button class="region-btn" onclick="startWithRegion('europa')">🇪🇺 Europa</button>
            <button class="region-btn" onclick="startWithRegion('azija')">🌏 Azija</button>
            <button class="region-btn" onclick="startWithRegion('afrika')">🌍 Afrika</button>
            <button class="region-btn" onclick="startWithRegion('amerike')">🌎 Amerike</button>
            <button class="region-btn" onclick="startWithRegion('okeanija')">🌊 Okeanija</button>
        </div>
    </div>
</div>

<script>
    let current=null,locked=false,score=0,currentQuestion=1,correctCount=0,wrongCount=0;
    let streak=0,wrongAnswersList=[],selectedRegion='';
    const TOTAL=20,TIME=20;
    let tLeft=TIME,timerId=null;
    const scoreEl=document.getElementById('score'),timerEl=document.getElementById('timer'),msgEl=document.getElementById('msg'),progEl=document.getElementById('progress');

    async function loadQuestion(){
        if(currentQuestion>TOTAL){finishQuiz();return}
        stopTimer();locked=false;msgEl.textContent='';msgEl.className='message';
        progEl.textContent=`${currentQuestion}/${TOTAL}`;
        document.getElementById('countryCard').innerHTML=`<div class="country-emoji" style="animation:none">⏳</div><div class="country-name-display" style="font-size:1.2rem;opacity:.6">Učitavam...</div>`;
        document.getElementById('options').innerHTML='';
        try{
            const res=await fetch(`/api/geomix_question?region=${selectedRegion}`);
            if(!res.ok)throw new Error(`HTTP ${res.status}`);
            const q=await res.json();
            if(q.error)throw new Error(q.error);
            current=q;
            await new Promise(r=>setTimeout(r,200));
            document.getElementById('countryCard').innerHTML=`
                <div class="type-badge type-${q.type}">${q.type_icon} ${q.type_label}</div>
                <img class="flag-img" src="${q.flag_url}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" alt="${q.country}">
                <div class="country-emoji" style="display:none">${q.emoji||'🌍'}</div>
                <div class="country-name-display">${q.country}</div>
                <div class="question-label">${q.question}</div>
            `;
            const cont=document.getElementById('options');
            cont.innerHTML='';
            q.options.forEach((opt,i)=>{
                const b=document.createElement('button');
                b.className='option-btn';b.textContent=opt;
                b.onclick=()=>check(opt,b);
                b.style.cssText='opacity:0;transform:translateY(16px)';
                cont.appendChild(b);
                setTimeout(()=>{b.style.transition='all .35s ease';b.style.opacity='1';b.style.transform='translateY(0)'},i*90+150);
            });
            tLeft=TIME;updateTimer();startTimer();
        }catch(err){document.getElementById('countryCard').innerHTML=`<div style="color:#ef4444">❌ ${err.message}</div>`}
    }

    function check(answer,btn,timeUp=false){
        if(locked)return;locked=true;stopTimer();
        const timeUsed=TIME-Math.max(0,tLeft);
        document.querySelectorAll('.option-btn').forEach(b=>{if(norm(b.textContent)===norm(current.correct))b.classList.add('option-correct')});
        if(btn&&norm(answer)!==norm(current.correct))btn.classList.add('option-wrong');
        if(norm(answer)===norm(current.correct)){
            streak++;updateStreak();
            const mult=getMult(),bonus=Math.max(0,50-Math.floor(timeUsed*5));
            const earned=Math.round((100+bonus)*mult);
            score+=earned;
            msgEl.textContent=`Tačno! +${earned}${mult>1?' 🔥 '+mult+'x':''} ✅`;msgEl.className='message success';
            correctCount++;
        }else if(timeUp){
            streak=0;updateStreak();
            wrongAnswersList.push({flag_url:current.flag_url,emoji:current.emoji,country:current.country,type_icon:current.type_icon,type_label:current.type_label,correct:current.correct,mine:null});
            msgEl.textContent=`⏰ Isteklo! Tačno: ${current.correct}`;msgEl.className='message timeout';wrongCount++;
        }else{
            streak=0;updateStreak();
            wrongAnswersList.push({flag_url:current.flag_url,emoji:current.emoji,country:current.country,type_icon:current.type_icon,type_label:current.type_label,correct:current.correct,mine:answer});
            msgEl.textContent=`❌ Netačno. Tačno: ${current.correct}`;msgEl.className='message error';wrongCount++;
        }
        scoreEl.textContent=`Score: ${score}`;scoreEl.style.transform='scale(1.1)';setTimeout(()=>scoreEl.style.transform='scale(1)',200);
        currentQuestion++;
        document.getElementById('nextBtn').textContent=currentQuestion<=TOTAL?`Sljedeće (${currentQuestion}/${TOTAL}) ➡️`:'Završi kviz 🏁';
    }

    function startTimer(){timerId=setInterval(()=>{tLeft--;updateTimer();if(tLeft<=0){stopTimer();if(!locked)check('',null,true)}},1000)}
    function stopTimer(){clearInterval(timerId);timerId=null}
    function updateTimer(){timerEl.textContent=`⏳ ${tLeft}s`;timerEl.style.setProperty('--progress',`${tLeft/TIME*100}%`);timerEl.style.color=tLeft<=3?'#ef4444':tLeft<=7?'#f59e0b':'#fff'}

    function finishQuiz(){
        document.getElementById('countryCard').style.display='none';
        document.getElementById('options').style.display='none';
        document.querySelector('.actions').style.display='none';
        const fs=document.getElementById('finishScreen');fs.style.display='flex';fs.classList.add('show');
        document.getElementById('finalScore').textContent=score;
        document.getElementById('stCorrect').textContent=correctCount;
        document.getElementById('stWrong').textContent=wrongCount;
        document.getElementById('stAcc').textContent=`${Math.round(correctCount/TOTAL*100)}%`;
        renderWrong();
        fetch('/api/submit_score',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({category_id:8,score,correct_answers:correctCount,total_questions:TOTAL,accuracy:Math.round(correctCount/TOTAL*100)})}).catch(()=>{});
    }

    function restartQuiz(){
        current=null;locked=false;score=0;currentQuestion=1;correctCount=0;wrongCount=0;streak=0;wrongAnswersList=[];tLeft=TIME;
        scoreEl.textContent='Score: 0';progEl.textContent='1/20';msgEl.textContent='';msgEl.className='message';
        document.getElementById('nextBtn').textContent='Sljedeće pitanje ➡️';
        const fs=document.getElementById('finishScreen');fs.style.display='none';fs.classList.remove('show');
        document.getElementById('countryCard').style.display='flex';
        document.getElementById('options').style.display='grid';
        document.querySelector('.actions').style.display='flex';
        document.getElementById('wrongReview').innerHTML='';
        updateStreak();
        document.getElementById('regionOverlay').style.display='flex';
    }

    function renderWrong(){
        const el=document.getElementById('wrongReview');
        if(!wrongAnswersList.length){el.innerHTML='<div class="perfect-msg">🏆 Sve tačno!</div>';return}
        el.innerHTML=`<div class="wrong-review-title">❌ Pogrešni (${wrongAnswersList.length})</div>
        <div class="wrong-grid">${wrongAnswersList.map(w=>`
            <div class="wrong-item">
                <img class="wi-flag" src="${w.flag_url}" onerror="this.style.display='none'" alt="">
                <div class="wi-country">${w.country}</div>
                <div class="wi-type">${w.type_icon} ${w.type_label}</div>
                <div class="wi-correct">✅ ${w.correct}</div>
                <div class="wi-wrong">${w.mine?'❌ '+w.mine:'⏰ Isteklo'}</div>
            </div>`).join('')}</div>`;
    }

    function startWithRegion(r){selectedRegion=r;document.getElementById('regionOverlay').style.display='none';loadQuestion()}
    function getMult(){if(streak>=7)return 2.5;if(streak>=5)return 2;if(streak>=3)return 1.5;return 1}
    function updateStreak(){const el=document.getElementById('streak');if(streak>=3){el.textContent=`🔥 ${streak}x`;el.classList.add('active')}else if(streak>0){el.textContent=`⚡ ${streak}`;el.classList.add('active')}else{el.textContent='';el.classList.remove('active')}}
    function norm(s){return(s||'').toString().trim().toLowerCase()}

    document.getElementById('nextBtn').onclick=loadQuestion;
    document.addEventListener('keydown',e=>{
        if(e.key>='1'&&e.key<='4'&&!locked)document.querySelectorAll('.option-btn')[+e.key-1]?.click();
        else if(e.key==='Enter'&&locked&&currentQuestion<=TOTAL)loadQuestion();
    });
    document.addEventListener('DOMContentLoaded',()=>document.getElementById('regionOverlay').style.display='flex');
</script>
</body>
</html>
