<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registracija</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style> body{ font-family:'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif; } </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#0f0f23] via-[#1a1a3e] to-[#7c3aed] text-white flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white/5 backdrop-blur-sm rounded-2xl shadow-lg p-6 sm:p-8 border border-white/10">
    <h1 class="text-2xl font-extrabold tracking-tight mb-6">Registracija</h1>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% if msgs %}
        <div class="space-y-2 mb-4">
          {% for cat, msg in msgs %}
            <div class="rounded-lg px-3 py-2 bg-violet-700/30 border border-violet-400/30">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('register') }}" class="space-y-4">
      <div>
        <label for="username" class="block text-sm mb-1 opacity-90">Korisničko ime</label>
        <input id="username" name="username" minlength="3" required
               class="w-full rounded-xl bg-black/30 border border-white/15 px-3 py-2 outline-none focus:ring-4 focus:ring-violet-500/30 focus:border-violet-400 placeholder-white/50" />
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label for="password" class="block text-sm mb-1 opacity-90">Lozinka</label>
          <input id="password" type="password" name="password" minlength="4" required
                 class="w-full rounded-xl bg-black/30 border border-white/15 px-3 py-2 outline-none focus:ring-4 focus:ring-violet-500/30 focus:border-violet-400 placeholder-white/50" />
        </div>
        <div>
          <label for="confirm" class="block text-sm mb-1 opacity-90">Potvrda</label>
          <input id="confirm" type="password" name="confirm" minlength="4" required
                 class="w-full rounded-xl bg-black/30 border border-white/15 px-3 py-2 outline-none focus:ring-4 focus:ring-violet-500/30 focus:border-violet-400 placeholder-white/50" />
        </div>
      </div>

      <button type="submit"
              class="w-full rounded-xl font-bold px-4 py-2 bg-violet-600 hover:bg-violet-500 transition border border-white/10 shadow">
        Kreiraj nalog
      </button>
    </form>

    <p class="mt-4 text-sm text-white/80">
      Već imaš nalog?
      <a href="{{ url_for('login') }}" class="font-semibold text-violet-200 hover:text-white">Prijava</a>
    </p>
  </div>
</body>
</html>
